name: check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    env:
      BUILDFIFIER_VERSION: '8.5.1'
      DEBIAN_FRONTEND: noninteractive

    steps:
      - run: |
          apt-get update
          apt-get upgrade -y
          apt-get install -y curl git python3

      - run: |
          curl -fsSL -o /usr/local/bin/buildifier \
            https://github.com/bazelbuild/buildtools/releases/download/v${BUILDFIFIER_VERSION}/buildifier-linux-amd64
          chmod +x /usr/local/bin/buildifier

      - uses: actions/checkout@v5

      - run: chown -R $(whoami):$(whoami) .

      - run: ./scripts/format_all.sh --check
